name: Garmin sync

on:
  schedule:
    # Every 2 hours (UTC), timezone-agnostic. Fills in "today's" active calories through
    # the day so a workout shows up in the budget within ~2h (plus watch->Garmin lag),
    # instead of only appearing the next morning. The commit step is a no-op when nothing
    # changed, and GitHub Actions is free/unlimited on public repos. Scheduled runs can be
    # delayed or occasionally skipped by GitHub under load — that's fine for this use.
    - cron: "0 */2 * * *"
  workflow_dispatch: {} # lets you trigger it manually from the Actions tab

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Restore Garmin token store
        run: |
          mkdir -p ~/.garminconnect
          echo "${{ secrets.GARMIN_TOKENSTORE_B64 }}" | base64 -d > /tmp/garmin_tokens.zip
          unzip -o /tmp/garmin_tokens.zip -d ~/.garminconnect

      - name: Run sync
        run: python scripts/garmin_sync.py

      - name: Commit updated data
        run: |
          git config user.name "garmin-sync-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/garmin.json
          git diff --cached --quiet || git commit -m "Sync Garmin data"
          git push
