name: Garmin sync

on:
  schedule:
    - cron: "0 6 * * *" # daily at 06:00 UTC
  workflow_dispatch: {} # lets you trigger it manually from the Actions tab

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Restore Garmin token store
        run: |
          mkdir -p ~/.garminconnect
          echo "${{ secrets.GARMIN_TOKENSTORE_B64 }}" | base64 -d > /tmp/garmin_tokens.zip
          unzip -o /tmp/garmin_tokens.zip -d ~/.garminconnect

      - name: Run sync
        run: python scripts/garmin_sync.py

      - name: Commit updated data
        run: |
          git config user.name "garmin-sync-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/garmin.json
          git diff --cached --quiet || git commit -m "Sync Garmin data"
          git push
